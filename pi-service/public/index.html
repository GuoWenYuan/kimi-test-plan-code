<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PIAgent 本机版</title>
<style>
  :root { --bg:#f7f7f9; --card:#fff; --line:#e2e3e8; --fg:#1c1d21; --muted:#757884; --accent:#4f46e5; --accent-soft:#eef0fe; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#141519; --card:#1d1f26; --line:#33363f; --fg:#e8e9ee; --muted:#9a9db0; --accent:#818cf8; --accent-soft:#23253a; }
  }
  * { box-sizing: border-box; margin: 0; }
  body { font: 14px/1.6 -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--line); background: var(--card); }
  header b { font-size: 14px; }
  header .tag { font-size: 11px; color: var(--muted); }
  header .sp { flex: 1; }
  input, textarea { background: var(--card); color: var(--fg); border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; font: inherit; }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent); }
  input:disabled { opacity: .55; cursor: not-allowed; }
  button { border: 1px solid var(--line); background: var(--card); color: var(--fg); border-radius: 8px; padding: 6px 12px; font: inherit; cursor: pointer; }
  button:hover { background: var(--accent-soft); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  details.cfg { position: relative; }
  details.cfg summary { cursor: pointer; font-size: 12px; color: var(--accent); list-style: none; }
  details.cfg .panel { position: absolute; right: 0; top: 26px; z-index: 30; width: 320px; background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 10px; box-shadow: 0 8px 24px rgb(0 0 0 / .15); display: grid; gap: 6px; }
  details.cfg label { font-size: 11px; color: var(--muted); }
  details.cfg input { width: 100%; }
  .app { flex: 1; display: flex; min-height: 0; position: relative; }
  aside { width: 230px; flex-shrink: 0; border-right: 1px solid var(--line); background: var(--card); overflow-y: auto; display: flex; flex-direction: column; }
  aside .side-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 12px; color: var(--muted); position: sticky; top: 0; background: var(--card); }
  aside .side-head button { padding: 1px 9px; font-size: 13px; }
  .sgroup { padding: 4px 0; }
  .sdir { font: 11px ui-monospace, Consolas, monospace; color: var(--muted); padding: 6px 10px 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: rtl; text-align: left; }
  .sitem { display: flex; align-items: center; gap: 4px; padding: 5px 10px; cursor: pointer; font-size: 13px; }
  .sitem:hover { background: var(--accent-soft); }
  .sitem.on { background: var(--accent-soft); box-shadow: inset 2px 0 0 var(--accent); }
  .sitem .stitle { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sitem .sdel { border: none; background: none; padding: 0 4px; color: var(--muted); font-size: 14px; line-height: 1; visibility: hidden; }
  .sitem:hover .sdel { visibility: visible; }
  .sitem .sdel:hover { color: #d44; }
  .col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .wdbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-bottom: 1px solid var(--line); background: var(--card); font-size: 12px; color: var(--muted); }
  .wdbar input { flex: 1; font-size: 12px; font-family: ui-monospace, Consolas, monospace; padding: 4px 8px; }
  main { flex: 1; overflow-y: auto; padding: 16px 12px; }
  .wrap { max-width: 760px; margin: 0 auto; display: grid; gap: 12px; }
  .msg { max-width: 85%; border-radius: 12px; padding: 8px 12px; white-space: pre-wrap; word-break: break-word; }
  .user { justify-self: end; background: var(--accent-soft); }
  .bot { justify-self: start; background: var(--card); border: 1px solid var(--line); }
  .bot.err { border-color: #e88; background: color-mix(in srgb, #e88 8%, var(--card)); }
  .think { font-size: 12px; color: var(--muted); }
  .think summary { cursor: pointer; }
  .tool { font: 11px ui-monospace, Consolas, monospace; color: var(--muted); margin-bottom: 2px; }
  .tool .ok { color: #3a3; } .tool .bad { color: #d44; }
  .empty { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--muted); text-align: center; }
  footer { border-top: 1px solid var(--line); padding: 10px 12px; background: var(--card); }
  footer .row { max-width: 760px; margin: 0 auto; display: flex; gap: 8px; }
  footer input { flex: 1; }
  .cursor { animation: blink 1s infinite; color: var(--muted); }
  @keyframes blink { 50% { opacity: 0; } }
  #sideToggle { display: none; padding: 4px 9px; }
  @media (max-width: 700px) {
    #sideToggle { display: block; }
    aside { display: none; position: absolute; left: 0; top: 0; bottom: 0; z-index: 20; width: 240px; box-shadow: 4px 0 16px rgb(0 0 0 / .2); }
    aside.open { display: flex; }
  }
</style>
</head>
<body>
<header>
  <button id="sideToggle" title="会话列表">☰</button>
  <b>PIAgent 本机版</b>
  <span class="tag" id="modelTag"></span>
  <span class="sp"></span>
  <details class="cfg" id="cfgBox">
    <summary>⚙ 模型设置</summary>
    <div class="panel">
      <label>Base URL（OpenAI 兼容；Kimi Code 端点自动走 Anthropic 协议）</label>
      <input id="cfgBaseUrl" placeholder="https://api.deepseek.com" />
      <label>API Key</label>
      <input id="cfgApiKey" type="password" placeholder="sk-..." />
      <label>模型 ID</label>
      <input id="cfgModel" placeholder="deepseek-chat" />
      <label>访问令牌（仅当服务设了 PI_SERVICE_TOKEN 时必填）</label>
      <input id="cfgToken" type="password" placeholder="（可留空）" />
      <button class="primary" id="cfgSave">保存</button>
    </div>
  </details>
</header>
<div class="app">
  <aside id="side">
    <div class="side-head"><span>会话（按目录分组）</span><button id="newChat" title="新会话">＋</button></div>
    <div id="sessions"></div>
  </aside>
  <div class="col">
    <div class="wdbar">
      <span>📁 工作目录</span>
      <input id="workDir" placeholder="留空 = pi-service 启动目录" />
    </div>
    <main id="main"><div class="wrap" id="list"></div></main>
    <footer>
      <div class="row">
        <input id="input" placeholder="输入指令，Enter 发送…" />
        <button class="primary" id="sendBtn">发送</button>
        <button id="stopBtn" hidden>停止</button>
      </div>
    </footer>
  </div>
</div>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const LS = {
  get: (k, d = "") => localStorage.getItem("piagent-" + k) ?? d,
  set: (k, v) => localStorage.setItem("piagent-" + k, v),
};
// 支持 #preset=<base64url(JSON {name,model,baseUrl,apiKey})> 自动配置模型（如工作站 /tools 页注入）；
// 写入 localStorage 后立即清除 hash，防止 key 残留在地址栏/书签
(function () {
  const m = location.hash.match(/(?:^|#|&)preset=([A-Za-z0-9_-]+)/);
  if (!m) return;
  try {
    let b64 = m[1].replace(/-/g, "+").replace(/_/g, "/");
    b64 += "=".repeat((4 - (b64.length % 4)) % 4);
    const p = JSON.parse(decodeURIComponent(escape(atob(b64))));
    if (p && p.baseUrl && p.apiKey && p.model) {
      LS.set("baseUrl", String(p.baseUrl));
      LS.set("apiKey", String(p.apiKey));
      LS.set("model", String(p.model));
      if (p.name) LS.set("presetName", String(p.name));
    }
  } catch { /* 解析失败忽略，退回手动填写 */ }
  history.replaceState(null, "", location.pathname + location.search);
})();

// 恢复设置
for (const k of ["baseUrl", "apiKey", "model", "token"]) $("cfg" + k[0].toUpperCase() + k.slice(1)).value = LS.get(k);
function uuid() { return (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") ? crypto.randomUUID() : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => { const r = (Math.random() * 16) | 0; return (c === "x" ? r : (r & 3) | 8).toString(16); }); }
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML.replace(/\n/g, "<br/>"); }

// ---- 会话存储：索引 piagent-sessions [{id,workDir,title,updatedAt}] + 消息 piagent-chat-<id> ----
// pi 服务端按 cwd 归档 session 上下文，因此每个会话绑定一个工作目录，历史按目录分组
const MAX_SESSIONS = 30, MAX_MSGS = 200;
function loadSessions() { try { const v = JSON.parse(localStorage.getItem("piagent-sessions") || "[]"); return Array.isArray(v) ? v : []; } catch { return []; } }
function saveSessions() { localStorage.setItem("piagent-sessions", JSON.stringify(sessions)); }
function loadMsgs(id) { try { const v = JSON.parse(localStorage.getItem("piagent-chat-" + id) || "[]"); return Array.isArray(v) ? v : []; } catch { return []; } }
function saveMsgs(id) { localStorage.setItem("piagent-chat-" + id, JSON.stringify(msgs.slice(-MAX_MSGS))); }

let sessions = loadSessions();
// 旧版单会话（piagent-sessionId）迁移进索引
const oldId = LS.get("sessionId");
if (oldId && !sessions.some((s) => s.id === oldId)) {
  sessions.unshift({ id: oldId, workDir: "", title: "历史会话", updatedAt: Date.now() });
}
localStorage.removeItem("piagent-sessionId");

let serverCwd = "";
let busy = false, ctrl = null;
let currentId = "";
let msgs = [];

function cur() { return sessions.find((s) => s.id === currentId); }
function newSession(workDir) {
  const s = { id: uuid(), workDir: workDir || "", title: "新会话", updatedAt: Date.now() };
  sessions.unshift(s);
  while (sessions.length > MAX_SESSIONS) {
    const old = sessions.pop();
    localStorage.removeItem("piagent-chat-" + old.id);
  }
  saveSessions();
  return s;
}
// 初始化当前会话：恢复上次，否则建空会话
currentId = LS.get("current");
if (!cur()) {
  const s = sessions[0] || newSession("");
  currentId = s.id;
}
LS.set("current", currentId);
msgs = loadMsgs(currentId);

function shortDir(d) {
  const parts = String(d).split(/[\\/]+/).filter(Boolean);
  return parts.length > 2 ? "…/" + parts.slice(-2).join("/") : d;
}
function dirLabel(dir) { return dir ? shortDir(dir) : "默认目录"; }
function dirTitle(dir) { return dir || (serverCwd ? "默认：" + serverCwd : "pi-service 启动目录"); }

function renderSidebar() {
  const box = $("sessions");
  box.innerHTML = "";
  const groups = new Map();
  for (const s of sessions) {
    const k = s.workDir || "";
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(s);
  }
  const sorted = [...groups.entries()].sort((a, b) =>
    Math.max(...b[1].map((s) => s.updatedAt)) - Math.max(...a[1].map((s) => s.updatedAt)));
  for (const [dir, list] of sorted) {
    const g = document.createElement("div");
    g.className = "sgroup";
    const h = document.createElement("div");
    h.className = "sdir";
    h.title = dirTitle(dir);
    h.textContent = "📁 " + dirLabel(dir);
    g.appendChild(h);
    for (const s of list.sort((a, b) => b.updatedAt - a.updatedAt)) {
      const it = document.createElement("div");
      it.className = "sitem" + (s.id === currentId ? " on" : "");
      const t = document.createElement("span");
      t.className = "stitle";
      t.textContent = s.title;
      t.title = s.title;
      const del = document.createElement("button");
      del.className = "sdel";
      del.textContent = "×";
      del.title = "删除会话";
      del.onclick = (e) => { e.stopPropagation(); delSession(s.id); };
      it.appendChild(t);
      it.appendChild(del);
      it.onclick = () => switchTo(s.id);
      g.appendChild(it);
    }
    box.appendChild(g);
  }
}

function delSession(id) {
  if (busy) return;
  sessions = sessions.filter((s) => s.id !== id);
  localStorage.removeItem("piagent-chat-" + id);
  saveSessions();
  if (id === currentId) {
    const nxt = sessions[0] || newSession("");
    currentId = nxt.id;
    LS.set("current", currentId);
    msgs = loadMsgs(currentId);
    renderChat();
  }
  renderSidebar();
  syncWorkDirInput();
}

function switchTo(id) {
  if (busy || id === currentId) return; // 流式中禁止切换
  currentId = id;
  LS.set("current", currentId);
  msgs = loadMsgs(id);
  renderChat();
  renderSidebar();
  syncWorkDirInput();
  $("side").classList.remove("open");
}

// 工作目录只在会话还没有消息时可改（pi 按 cwd 归档上下文，改目录=另一段上下文）
function syncWorkDirInput() {
  const s = cur();
  const input = $("workDir");
  input.value = s?.workDir || "";
  input.disabled = busy || msgs.length > 0;
  input.title = input.disabled && !busy
    ? "会话已有消息，工作目录不可修改；点 ＋ 新建会话可选择其他目录"
    : "当前会话的工作目录（绝对路径），留空用 pi-service 启动目录";
}
$("workDir").addEventListener("change", () => {
  const s = cur();
  if (!s || msgs.length > 0) { syncWorkDirInput(); return; }
  s.workDir = $("workDir").value.trim();
  saveSessions();
  renderSidebar();
  syncWorkDirInput();
});

function persist() {
  const s = cur();
  if (!s) return;
  saveMsgs(s.id);
  s.updatedAt = Date.now();
  if (s.title === "新会话") {
    const u = msgs.find((m) => m.role === "user");
    if (u && u.text.trim()) s.title = u.text.trim().slice(0, 30);
  }
  saveSessions();
  renderSidebar();
}

function updateEmpty() {
  const empty = $("empty");
  if (!empty) return;
  const name = LS.get("presetName");
  const configured = Boolean(LS.get("model"));
  // 空状态文案随配置状态动态显示（配置成功仍提示"配置模型后开始对话"会误导）
  empty.innerHTML = configured
    ? "模型已配置：" + esc(name || LS.get("model")) + "，在下方输入指令开始对话。<br/>所有操作都发生在<b>本机</b>当前工作目录（pi 直接读写文件、执行命令）。"
    : "配置模型后开始对话。<br/>所有操作都发生在<b>本机</b>当前工作目录（pi 直接读写文件、执行命令）。";
}
function modelTag() {
  const name = LS.get("presetName");
  const configured = Boolean(LS.get("model"));
  $("modelTag").textContent = configured ? "模型：" + (name ? name + "（" + LS.get("model") + "）" : LS.get("model")) : "未配置模型";
  updateEmpty();
}

const list = $("list");
function addMsg(role, m) {
  $("empty")?.remove();
  const el = document.createElement("div");
  el.className = "msg " + role + (m?.err ? " err" : "");
  el._text = m?.text || "";
  el._think = m?.think || "";
  el._tools = m?.tools || [];
  list.appendChild(el);
  render(el, false);
  return el;
}
function render(el, streaming) {
  let html = "";
  if (el._think) html += '<details class="think"><summary>思考过程</summary>' + esc(el._think) + "</details>";
  html += (el._tools || []).map((t) => '<div class="tool">⚙ ' + esc(t.tool + (t.args ? " " + t.args : "")) + (t.isError === true ? ' <span class="bad">✗</span>' : t.isError === false ? ' <span class="ok">✓</span>' : "") + "</div>").join("");
  html += esc(el._text) + (streaming ? '<span class="cursor">▍</span>' : "");
  el.innerHTML = html;
  $("main").scrollTop = $("main").scrollHeight;
}
function renderChat() {
  list.innerHTML = "";
  if (!msgs.length) {
    const d = document.createElement("div");
    d.className = "empty";
    d.id = "empty";
    list.appendChild(d);
    updateEmpty();
    return;
  }
  for (const m of msgs) addMsg(m.role, m);
  $("main").scrollTop = $("main").scrollHeight;
}

async function send() {
  const text = $("input").value.trim();
  if (!text || busy) return;
  if (!LS.get("baseUrl") || !LS.get("apiKey") || !LS.get("model")) { alert("请先在「模型设置」里填 Base URL / API Key / 模型 ID"); $("cfgBox").open = true; return; }
  const s = cur();
  if (!s) return;
  const firstExchange = msgs.length === 0;
  $("input").value = "";
  const um = { role: "user", text, think: "", tools: [] };
  msgs.push(um);
  addMsg("user", um);
  persist(); // 先存用户消息（首条会顺便生成会话标题）
  const bm = { role: "bot", text: "", think: "", tools: [], err: false };
  msgs.push(bm);
  const bot = addMsg("bot", bm);
  setBusy(true);
  ctrl = new AbortController();
  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json", ...(LS.get("token") ? { "x-pi-token": LS.get("token") } : {}) },
      body: JSON.stringify({
        message: text,
        sessionId: s.id,
        ...(s.workDir ? { workDir: s.workDir } : {}),
        preset: { baseUrl: LS.get("baseUrl"), apiKey: LS.get("apiKey"), model: LS.get("model") },
      }),
      signal: ctrl.signal,
    });
    if (!res.ok || !res.body) {
      const err = await res.json().catch(() => null);
      throw new Error(err?.error ?? "请求失败（" + res.status + "）");
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const chunks = buffer.split("\n\n");
      buffer = chunks.pop() ?? "";
      for (const chunk of chunks) {
        const line = chunk.trim();
        if (!line.startsWith("data:")) continue;
        let e; try { e = JSON.parse(line.slice(5)); } catch { continue; }
        if (e.type === "delta") bot._text += e.text;
        else if (e.type === "think") bot._think += e.text;
        else if (e.type === "tool_start") bot._tools.push({ tool: e.tool, args: e.args });
        else if (e.type === "tool_end") { for (let i = bot._tools.length - 1; i >= 0; i--) { if (bot._tools[i].tool === e.tool && bot._tools[i].isError === undefined) { bot._tools[i].isError = !!e.isError; break; } } }
        else if (e.type === "error") { bot.classList.add("err"); bot._text += (bot._text ? "\n\n" : "") + "[错误] " + e.message; }
        render(bot, true);
      }
    }
  } catch (err) {
    if (!ctrl.signal.aborted) { bot.classList.add("err"); bot._text += (bot._text ? "\n\n" : "") + "[错误] " + (err.message || err); }
  } finally {
    render(bot, false);
    setBusy(false);
    ctrl = null;
    // 首轮就失败（多为工作目录填错）：回滚这两条消息，保持会话为空以便修改目录
    if (firstExchange && bot.classList.contains("err") && !bot._text.replace(/\[错误\][\s\S]*/g, "").trim()) {
      msgs.splice(Math.max(0, msgs.length - 2));
      renderChat();
      renderSidebar();
    } else {
      bm.text = bot._text;
      bm.think = bot._think;
      bm.tools = bot._tools;
      bm.err = bot.classList.contains("err");
      persist();
    }
  }
}
function setBusy(v) {
  busy = v;
  $("sendBtn").hidden = v;
  $("stopBtn").hidden = !v;
  $("sendBtn").disabled = v;
  syncWorkDirInput();
}

$("cfgSave").onclick = () => {
  for (const k of ["baseUrl", "apiKey", "model", "token"]) LS.set(k, $("cfg" + k[0].toUpperCase() + k.slice(1)).value.trim());
  localStorage.removeItem("piagent-presetName"); // 手动修改后不再显示注入的预设名
  modelTag();
  $("cfgBox").open = false;
};
$("newChat").onclick = () => {
  if (busy) return;
  // 沿用当前目录（可编辑时以输入框为准），创建后消息为空、目录仍可修改
  const dir = $("workDir").disabled ? (cur()?.workDir || "") : $("workDir").value.trim();
  const s = newSession(dir);
  currentId = s.id;
  LS.set("current", currentId);
  msgs = [];
  renderChat();
  renderSidebar();
  syncWorkDirInput();
  $("input").focus();
};
$("sideToggle").onclick = () => $("side").classList.toggle("open");
$("sendBtn").onclick = send;
$("stopBtn").onclick = () => ctrl?.abort();
$("input").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.isComposing) send(); });

// 服务启动目录（/health 免 token），用于默认目录的展示
fetch("/health").then((r) => r.json()).then((h) => {
  serverCwd = h.cwd || "";
  if (serverCwd) $("workDir").placeholder = "留空 = " + serverCwd;
  renderSidebar();
}).catch(() => {});

modelTag();
renderChat();
renderSidebar();
syncWorkDirInput();
</script>
</body>
</html>
